---
# https://pre-commit.com
default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit, manual]
fail_fast: true
repos:
  - repo: "https://github.com/commitizen-tools/commitizen"
    rev: v4.16.3
    hooks:
      - id: commitizen

  - repo: "https://github.com/pre-commit/pygrep-hooks"
    rev: v1.10.0
    hooks:
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char

  - repo: "https://github.com/pre-commit/pre-commit-hooks"
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-json
        exclude: .devcontainer/|.vscode/
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
        # These files contain PEM armor markers as documentation and as code that
        # rebuilds them from a bare base64 body, not as real key material.
        exclude: ^(docs/oauth-apple\.md|src/vweb/routes/auth/apple_oauth\.py)$
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace
        types: [python]
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        types: [python]

  - repo: "https://github.com/adrienverge/yamllint.git"
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: ^.*\.(yaml|yml)$
        entry: yamllint --strict --config-file .yamllint.yml

  - repo: "https://github.com/astral-sh/ruff-pre-commit"
    rev: v0.15.16
    hooks:
      - id: ruff
        exclude: tests/
        args: [--no-fix]
      - id: ruff-format
        args: [--check]

  - repo: "https://github.com/adhtruong/mirrors-typos"
    rev: v1.47.2
    hooks:
      - id: typos
        args: ["--force-exclude"]
        stages: [commit-msg, pre-commit]

  - repo: "https://github.com/djlint/djLint"
    rev: v1.39.0
    hooks:
      - id: djlint
        args: ["--configuration", "pyproject.toml"]

  - repo: "https://github.com/python-jsonschema/check-jsonschema"
    rev: 0.37.2
    hooks:
      - id: check-github-workflows
        args: ["--verbose"]

  - repo: "https://github.com/gitleaks/gitleaks"
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config", "gitleaks.toml"]

  - repo: "https://github.com/crate-ci/committed"
    rev: v1.1.11
    hooks:
      - id: committed
        stages: [commit-msg]

  - repo: "https://github.com/tsvikas/sync-with-uv"
    rev: v0.5.0
    hooks:
      - id: sync-with-uv

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --check-sourced --severity=warning
        language: system
        types: [shell]

      - id: ty (type check)
        name: ty
        entry: uv run duty ty
        pass_filenames: false
        language: system
        types: [python]

      - id: pytest
        name: pytest
        entry: uv run duty test
        language: system
        pass_filenames: false
        files: |
          (?x)^(
          src/|
          tests/|
          uv\.lock|
          pyproject\.toml
          )

      # Workaround until commitizen fixes its commitizen-branch hook (see commitizen #1923).
      # The upstream hook's args contain the literal "$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF",
      # but no client (pre-commit, prek) substitutes those placeholders, and `cz check` doesn't
      # expand them either, so git receives them verbatim and fails with "ambiguous argument".
      # Wrapping the call in `bash -c` forces the shell to expand the env vars prek/pre-commit
      # do set. Remove this block once commitizen ships a fix upstream.
      - id: commitizen-branch
        name: commitizen check branch
        entry: bash -c 'uv run --quiet cz check --rev-range "$PRE_COMMIT_FROM_REF..$PRE_COMMIT_TO_REF"' --
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
