title = "Custom Gitleaks configuration"

# [paths]
# ignore = ['''(^|/)tests/fixtures/endpoints''']

[extend]
    useDefault = true

[[allowlists]]
    description = "ignore # nosec lines"
    regexTarget = "line"
    regexes     = ['''# nosec''']

[[allowlists]]
    description = "Apple Sign in docs and code contain PEM armor markers, not real keys"
    paths = [
        '''docs/oauth-apple\.md''',
        '''src/vweb/lib/apple_oauth\.py''',
    ]
